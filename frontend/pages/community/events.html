<div id="page-events" class="page pt-16">
  <main class="max-w-7xl mx-auto px-6 md:px-8 py-20">

    <div class="mb-16">
      <div class="border-l-4 border-[#D4AF37] pl-8 mb-4">
        <p class="font-mono text-[10px] uppercase tracking-[0.2em] text-[#D4AF37] mb-2">CLUB_EVENTS.LOG</p>
        <h1 class="text-5xl font-headline font-bold text-white">Club Events</h1>
      </div>
      <p class="pl-8 text-on-surface-variant text-sm font-mono leading-relaxed mt-4 max-w-xl">
        Workshops, hackathons, CTF competitions, and seminars. Join events to earn Cyber Coins and proof-of-work records for your portfolio.
      </p>
    </div>

    <div class="flex flex-wrap gap-4 mb-10 border-b border-white/10 pb-4" id="events-filter-bar">
      <button onclick="filterEvents('ALL', this)"
        class="text-primary font-mono text-xs uppercase tracking-widest border-b-2 border-primary pb-2 transition-all">ALL</button>
      <button onclick="filterEvents('HACKATHON', this)"
        class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">HACKATHON</button>
      <button onclick="filterEvents('WORKSHOP', this)"
        class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">WORKSHOP</button>
      <button onclick="filterEvents('CTF', this)"
        class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">CTF</button>
      <button onclick="filterEvents('SEMINAR', this)"
        class="text-gray-500 hover:text-white font-mono text-xs uppercase tracking-widest border-b-2 border-transparent hover:border-white/30 pb-2 transition-all">SEMINAR</button>
    </div>

    <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Rendered by JS -->
    </div>

  </main>
</div>
