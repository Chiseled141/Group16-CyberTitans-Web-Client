<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Error — CyberTitans</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: { colors: {
        "primary": "#8eff71", "surface": "#0e0e0e",
        "surface-container-low": "#131313", "on-surface": "#ffffff",
        "on-surface-variant": "#adaaaa", "error": "#ff7351"
      }, fontFamily: { "headline": ["Space Grotesk"], "mono": ["JetBrains Mono"] } } }
    }
  </script>
</head>
<body class="bg-[#0e0e0e] text-white font-mono min-h-screen flex flex-col items-center justify-center px-6 selection:bg-primary selection:text-[#0d6100]">

  <!-- Grid background -->
  <div class="fixed inset-0 pointer-events-none" style="background-image:linear-gradient(rgba(142,255,113,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(142,255,113,0.03) 1px,transparent 1px);background-size:40px 40px;"></div>

  <div class="relative z-10 max-w-2xl w-full text-center">

    <!-- Status code -->
    <p class="font-mono text-[10px] uppercase tracking-[0.4em] text-on-surface-variant mb-6">SYSTEM_ERROR.LOG</p>
    <div class="relative mb-6">
      <h1 class="font-headline font-black text-[10rem] leading-none select-none"
          style="color:transparent;-webkit-text-stroke:1px rgba(142,255,113,0.15);"
          th:text="${status} ?: '???'">500</h1>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="font-mono text-[10px] uppercase tracking-[0.3em] text-error px-3 py-1 border border-error/30 bg-error/5"
              th:text="${error} ?: 'UNKNOWN ERROR'">INTERNAL SERVER ERROR</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-4 mb-8">
      <div class="flex-1 h-px bg-white/5"></div>
      <span class="text-[9px] uppercase tracking-widest text-on-surface-variant">TRANSMISSION INTERRUPTED</span>
      <div class="flex-1 h-px bg-white/5"></div>
    </div>

    <!-- Message -->
    <p class="text-on-surface-variant text-sm leading-relaxed mb-3"
       th:text="${message} ?: 'An unexpected error occurred. Our team has been notified.'">
      An unexpected error occurred.
    </p>

    <!-- Path -->
    <p class="text-[10px] text-on-surface-variant/50 mb-10" th:if="${path}">
      PATH: <span class="text-primary/60" th:text="${path}">/unknown</span>
    </p>

    <!-- Actions -->
    <div class="flex items-center justify-center gap-4 flex-wrap">
      <a href="/" class="px-8 py-3 bg-primary text-black font-headline font-bold text-xs uppercase tracking-widest hover:brightness-110 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px]">home</span> Return Home
      </a>
      <button onclick="history.back()" class="px-8 py-3 border border-white/10 text-on-surface-variant text-xs uppercase tracking-widest hover:border-primary/40 hover:text-white transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px]">arrow_back</span> Go Back
      </button>
    </div>

    <!-- Footer trace -->
    <p class="mt-16 text-[9px] uppercase tracking-[0.3em] text-on-surface-variant/30">
      CyberTitans — The Digital Vault &nbsp;·&nbsp;
      <span th:text="${#temporals.format(timestamp, 'dd MMM yyyy HH:mm')} ?: ''"></span>
    </p>
  </div>

</body>
</html>
