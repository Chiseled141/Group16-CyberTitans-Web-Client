<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

    <header class="mb-12 flex items-end justify-between">
      <div class="border-l-2 border-primary pl-8">

      </div>
      <button id="create-project-btn" onclick="openCreateProjectModal()" class="hidden items-center gap-2 bg-primary text-black font-mono text-xs font-bold uppercase tracking-widest px-5 py-3 hover:brightness-110 transition-all neon-glow-primary">

</html>
