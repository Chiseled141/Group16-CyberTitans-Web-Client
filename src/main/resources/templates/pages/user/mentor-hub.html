<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content" id="page-mentor-hub" class="page pt-16">
  <main class="max-w-4xl mx-auto px-6 md:px-8 py-20">

    <div class="mb-12">
      <div class="border-l-4 border-primary pl-8">
        <p class="font-mono text-[10px] uppercase tracking-[0.2em] text-primary mb-2">MENTOR_CONTROL.EXE</p>
        <h1 class="text-5xl font-headline font-bold text-white">Mentor Hub</h1>
      </div>
      <p class="pl-8 text-on-surface-variant text-sm font-mono leading-relaxed mt-4 max-w-xl">
        Manage incoming mentorship requests, guide your assigned mentees, and track your mentorship activity.
      </p>
    </div>

    <!-- Tab bar -->
    <div class="flex border-b border-white/10 mb-8">
      <button id="tab-inbox" onclick="showMentorHubTab('inbox')"
        class="font-mono text-xs uppercase tracking-widest py-3 px-5 border-b-2 border-primary text-primary transition-all flex items-center gap-2">
        INBOX
        <span id="mentor-inbox-badge" class="hidden bg-red-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full leading-none">0</span>
      </button>
      <button id="tab-assigned" onclick="showMentorHubTab('assigned')"
        class="font-mono text-xs uppercase tracking-widest py-3 px-5 border-b-2 border-transparent text-gray-500 hover:text-white transition-all">
        ASSIGNED
      </button>
      <button id="tab-guide" onclick="showMentorHubTab('guide')"
        class="font-mono text-xs uppercase tracking-widest py-3 px-5 border-b-2 border-transparent text-gray-500 hover:text-white transition-all">
        GUIDE
      </button>
      <button id="tab-skills" onclick="showMentorHubTab('skills')"
        class="font-mono text-xs uppercase tracking-widest py-3 px-5 border-b-2 border-transparent text-gray-500 hover:text-white transition-all">
        MY SKILLS
      </button>
    </div>

    <div id="mentor-hub-content" class="space-y-4">
      <!-- Rendered by JS -->
    </div>

  </main>
</div>
</body>
</html>
