<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content" id="page-publications" class="page pt-16">
  <main class="max-w-7xl mx-auto px-6 md:px-8 py-20">

    <div class="mb-20">
        <div class="flex items-end justify-between mb-4">
            <div class="border-l-4 border-tertiary pl-8">
                <p class="text-tertiary font-mono text-xs tracking-widest uppercase mb-2">Club Repository</p>
                <h1 class="text-5xl font-headline font-bold text-white">Publications</h1>
            </div>
            <button id="create-publication-btn" onclick="openCreatePublicationModal()" class="hidden items-center gap-2 bg-primary text-black font-mono text-xs font-bold uppercase tracking-widest px-5 py-3 hover:brightness-110 transition-all neon-glow-primary">
                <span class="material-symbols-outlined text-[16px]">add</span> New Publication
            </button>
        </div>
        <p class="text-gray-400 text-sm pl-8 mb-12 max-w-2xl">Research papers, theses, and academic works by CyberTitans members and advisors.</p>

        <div class="flex flex-wrap gap-4 mt-8 mb-12 border-b border-white/10 pb-4" id="pub-filter-bar">
            <button onclick="filterPublications('ALL', this)" class="text-primary font-mono text-xs uppercase tracking-widest border-b-2 border-primary pb-2 transition-all">ALL</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="publications-grid">
        </div>
    </div>
    </main>
</div>
</body>
</html>
